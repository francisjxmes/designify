<h1>Your Cart</h1>

{% if order %}
    <ul>
        {% for item in items %}
            <li>{{ item.quantity }} × {{ item.product.name }} - €{{ item.total_price }}</li>
        {% endfor %}
    </ul>

    <p>Total: €{{ total }}</p>

    <form action="{% url 'stripe_checkout' order.id %}" method="POST">
        {% csrf_token %}
        <button type="submit">Checkout with Stripe</button>
    </form>
{% else %}
    <p>Your cart is empty.</p>
{% endif %}
